version: '3.8'

services:
  backend:
    build: .
    container_name: trafegoalerta_backend
    restart: always
    ports:
      - "3005:3000"
    env_file:
      - .env
    # Adicionando healthcheck para garantir que está rodando
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
